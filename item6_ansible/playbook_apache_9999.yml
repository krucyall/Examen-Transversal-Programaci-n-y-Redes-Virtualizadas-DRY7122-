---
- name: Instalar y configurar Apache en puerto 9999
  hosts: local
  become: yes
  tasks:

    - name: Actualizar cache de apt
      apt:
        update_cache: yes

    - name: Instalar Apache2
      apt:
        name: apache2
        state: present

    - name: Cambiar puerto de escucha en ports.conf
      lineinfile:
        path: /etc/apache2/ports.conf
        regexp: '^Listen 80'
        line: 'Listen 9999'

    - name: Cambiar VirtualHost por defecto a puerto 9999
      lineinfile:
        path: /etc/apache2/sites-available/000-default.conf
        regexp: '^<VirtualHost \*:80>'
        line: '<VirtualHost *:9999>'

    - name: Reiniciar Apache2 para aplicar cambios
      service:
        name: apache2
        state: restarted
        enabled: yes

    - name: Verificar que Apache esta escuchando en 9999
      shell: ss -tlnp | grep 9999
      register: verificacion
      changed_when: false
      failed_when: verificacion.rc > 1

    - name: Mostrar verificacion
      debug:
        var: verificacion.stdout_lines
