---
- name: Configurar Loopback33 con IPv6
  hosts: routers
  gather_facts: no
  tasks:

    - name: Crear interfaz Loopback33
      cisco.ios.ios_config:
        lines:
          - description Loopback33 - Item 6 Ansible
        parents: interface Loopback33

    - name: Asignar direccion IPv6 global y link-local
      cisco.ios.ios_config:
        lines:
          - ipv6 enable
          - ipv6 address 3001:ABCD:ABCD:1::1/128
          - ipv6 address FE80::1 link-local
        parents: interface Loopback33

    - name: Verificar configuracion de Loopback33
      cisco.ios.ios_command:
        commands:
          - show ipv6 interface Loopback33
      register: resultado

    - name: Mostrar resultado
      debug:
        var: resultado.stdout_lines
